<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>IT Help Desk Simulator</title>
	<style>
		*, *::before, *::after { box-sizing: border-box; }
		body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f7fb; color: #1f2937; }
		h1, h2, h3 { margin: 0 0 8px; }
		.grid { display: grid; gap: 20px; grid-template-columns: 1fr; }
		.panel { background: white; border-radius: 10px; padding: 18px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
		table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
		th, td { text-align: left; padding: 7px 8px; border-bottom: 1px solid #e5e7eb; }
		th { background: #eef2ff; font-weight: 600; }
		tr:last-child td { border-bottom: none; }
		button { border: none; border-radius: 6px; padding: 7px 12px; cursor: pointer; font-size: 0.85rem; }
		button.primary { background: #2563eb; color: white; }
		button.danger  { background: #dc2626; color: white; }
		button.secondary { background: #e5e7eb; color: #1f2937; }
		button:hover { opacity: .88; }
		.toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
		.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
		.filters select { border: 1px solid #d1d5db; border-radius: 6px; padding: 5px 8px; font-size: 0.85rem; }

		/* Priority badges */
		.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.78rem; font-weight: 600; }
		.p-Critical { background: #fee2e2; color: #991b1b; }
		.p-High     { background: #ffedd5; color: #9a3412; }
		.p-Medium   { background: #fef9c3; color: #854d0e; }
		.p-Low      { background: #dcfce7; color: #166534; }
		.s-Open        { background: #dbeafe; color: #1e40af; }
		.s-In-Progress { background: #e9d5ff; color: #6b21a8; }
		.s-Resolved    { background: #d1fae5; color: #065f46; }

		/* SLA */
		.sla-ok      { color: #059669; font-size: 0.8rem; }
		.sla-warn    { color: #d97706; font-size: 0.8rem; }
		.sla-breach  { color: #dc2626; font-size: 0.8rem; font-weight: 600; }

		/* Modal */
		.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; justify-content: center; align-items: flex-start; padding-top: 60px; }
		.modal-overlay.open { display: flex; }
		.modal-box { background: white; border-radius: 12px; padding: 24px; width: 100%; max-width: 560px; max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
		.modal-box h2 { margin-bottom: 16px; }
		.form-group { margin-bottom: 12px; }
		.form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; color: #374151; }
		.form-group input, .form-group select, .form-group textarea {
			width: 100%; border: 1px solid #d1d5db; border-radius: 6px;
			padding: 7px 10px; font-size: 0.9rem; font-family: inherit;
		}
		.form-group textarea { resize: vertical; min-height: 80px; }
		.form-row { display: flex; gap: 10px; }
		.form-row .form-group { flex: 1; }
		.modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

		/* Notes */
		.note-list { margin: 10px 0; display: flex; flex-direction: column; gap: 8px; }
		.note-item { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; }
		.note-meta { font-size: 0.78rem; color: #6b7280; margin-bottom: 4px; }
		.note-body { font-size: 0.88rem; }
		.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; margin-bottom: 16px; }
		.detail-item label { font-size: 0.78rem; color: #6b7280; display: block; }
		.detail-item span  { font-size: 0.9rem; font-weight: 500; }

		.empty-row td { color: #9ca3af; font-style: italic; padding: 14px 8px; }
		.secret { color: transparent; background: #d1d5db; border-radius: 3px; cursor: default; user-select: none; transition: color 0.15s, background 0.15s; }
		.secret:hover { color: inherit; background: transparent; user-select: text; }
	</style>
</head>
<body>
	<h1>IT Help Desk Simulator</h1>

	<div class="toolbar">
		<button class="primary" onclick="loadAll()">Refresh</button>
		<button class="primary" onclick="openCreateModal()">+ Create Ticket</button>
		<button class="primary" onclick="generateTickets()">Generate Tickets</button>
		<button class="secondary" onclick="exportUsers()">Export Users CSV</button>
		<button class="danger" onclick="clearTickets()" style="margin-left:auto">Clear All Tickets</button>
	</div>

	<div class="grid">
		<!-- Open / In-Progress Tickets -->
		<div class="panel">
			<h2>Open Tickets</h2>
			<div class="filters">
				<select id="filter-category" onchange="applyFilters()">
					<option value="">All Categories</option>
					<option>Password Reset</option>
					<option>Account Lockout</option>
					<option>New Hire Setup</option>
					<option>Software Installation</option>
					<option>Hardware Issue</option>
				</select>
				<select id="filter-priority" onchange="applyFilters()">
					<option value="">All Priorities</option>
					<option>Critical</option>
					<option>High</option>
					<option>Medium</option>
					<option>Low</option>
				</select>
				<select id="filter-status" onchange="applyFilters()">
					<option value="">All Statuses</option>
					<option>Open</option>
					<option>In Progress</option>
				</select>
			</div>
			<table id="tickets-open-table">
				<thead>
					<tr><th>ID</th><th>Title</th><th>Category</th><th>Priority</th><th>Status</th><th>User</th><th>Assigned</th><th>SLA</th><th>Actions</th></tr>
				</thead>
				<tbody></tbody>
			</table>
		</div>

		<!-- Closed Tickets -->
		<div class="panel">
			<h2>Resolved Tickets</h2>
			<table id="tickets-closed-table">
				<thead>
					<tr><th>ID</th><th>Title</th><th>Category</th><th>Priority</th><th>User</th><th>Assigned</th><th>Resolved</th></tr>
				</thead>
				<tbody></tbody>
			</table>
		</div>

		<!-- Users -->
		<div class="panel">
			<h2>Users</h2>
			<table id="users-table">
				<thead>
					<tr><th>Username</th><th>Name</th><th>Department</th><th>Email</th><th>Password</th><th>Locked</th></tr>
				</thead>
				<tbody></tbody>
			</table>
		</div>

		<!-- Computers -->
		<div class="panel">
			<h2>Computers</h2>
			<table id="computers-table">
				<thead>
					<tr><th>Hostname</th><th>IP</th><th>Department</th><th>User</th></tr>
				</thead>
				<tbody></tbody>
			</table>
		</div>

		<!-- Departments -->
		<div class="panel">
			<h2>Departments</h2>
			<table id="departments-table">
				<thead>
					<tr><th>Name</th><th>Manager</th></tr>
				</thead>
				<tbody></tbody>
			</table>
		</div>
	</div>

	<!-- ── Create Ticket Modal ── -->
	<div id="create-modal" class="modal-overlay" onclick="onOverlayClick(event,'create-modal')">
		<div class="modal-box">
			<h2>Create New Ticket</h2>
			<div class="form-row">
				<div class="form-group" style="flex:2">
					<label>Title</label>
					<input id="ct-title" type="text" placeholder="Brief summary of the issue" />
				</div>
			</div>
			<div class="form-row">
				<div class="form-group">
					<label>Category</label>
					<select id="ct-category">
						<option>Password Reset</option>
						<option>Account Lockout</option>
						<option>New Hire Setup</option>
						<option>Software Installation</option>
						<option>Hardware Issue</option>
					</select>
				</div>
				<div class="form-group">
					<label>Priority</label>
					<select id="ct-priority">
						<option>Low</option>
						<option selected>Medium</option>
						<option>High</option>
						<option>Critical</option>
					</select>
				</div>
			</div>
			<div class="form-row">
				<div class="form-group">
					<label>User Affected</label>
					<select id="ct-user"></select>
				</div>
				<div class="form-group">
					<label>Assigned To</label>
					<input id="ct-assigned" type="text" placeholder="Technician name (optional)" />
				</div>
			</div>
			<div class="form-group">
				<label>Description</label>
				<textarea id="ct-description" placeholder="Describe the issue in detail..."></textarea>
			</div>
			<div class="modal-actions">
				<button class="secondary" onclick="closeModal('create-modal')">Cancel</button>
				<button class="primary" onclick="submitCreateTicket()">Create Ticket</button>
			</div>
		</div>
	</div>

	<!-- ── Ticket Detail Modal ── -->
	<div id="detail-modal" class="modal-overlay" onclick="onOverlayClick(event,'detail-modal')">
		<div class="modal-box">
			<h2 id="detail-title"></h2>
			<div class="detail-grid" id="detail-grid"></div>
			<p id="detail-description" style="font-size:0.9rem;color:#374151;margin-bottom:16px;"></p>

			<h3>Work Notes</h3>
			<div class="note-list" id="note-list"></div>

			<div class="form-group" style="margin-top:12px">
				<label>Add Note</label>
				<textarea id="new-note-body" placeholder="Document your work, findings, or next steps..." style="min-height:60px"></textarea>
			</div>
			<div class="form-row">
				<div class="form-group">
					<label>Author</label>
					<input id="new-note-author" type="text" value="Technician" />
				</div>
				<div class="form-group" style="display:flex;align-items:flex-end">
					<button class="primary" onclick="submitNote()" style="width:100%">Add Note</button>
				</div>
			</div>
			<div class="modal-actions">
				<button class="secondary" onclick="closeModal('detail-modal')">Close</button>
			</div>
		</div>
	</div>

	<script>
		let allTickets = [];
		let currentDetailTicketId = null;

		// ── Utilities ──────────────────────────────────────────────────────────
		async function fetchJson(url, options) {
			const res = await fetch(url, options);
			return res.json();
		}

		function closeModal(id) {
			document.getElementById(id).classList.remove('open');
		}

		function openModal(id) {
			document.getElementById(id).classList.add('open');
		}

		function onOverlayClick(e, id) {
			if (e.target === e.currentTarget) closeModal(id);
		}

		function priorityBadge(p) {
			return `<span class="badge p-${p}">${p}</span>`;
		}

		function statusBadge(s) {
			const cls = s.replace(' ', '-');
			return `<span class="badge s-${cls}">${s}</span>`;
		}

		function slaDisplay(deadline, status) {
			if (!deadline || status === 'Resolved') return '—';
			const diff = new Date(deadline) - Date.now();
			if (diff < 0) return `<span class="sla-breach">Breached</span>`;
			const h = Math.floor(diff / 3600000);
			const m = Math.floor((diff % 3600000) / 60000);
			const cls = h < 2 ? 'sla-warn' : 'sla-ok';
			return `<span class="${cls}">${h}h ${m}m</span>`;
		}

		function fmtDate(s) {
			if (!s) return '—';
			return new Date(s).toLocaleString();
		}

		// ── Filters ───────────────────────────────────────────────────────────
		function applyFilters() {
			const cat  = document.getElementById('filter-category').value;
			const pri  = document.getElementById('filter-priority').value;
			const stat = document.getElementById('filter-status').value;
			const open = allTickets.filter(t =>
				t.status !== 'Resolved' &&
				(!cat  || t.category === cat) &&
				(!pri  || t.priority === pri) &&
				(!stat || t.status === stat)
			);
			renderOpenTickets(open);
		}

		// ── Ticket tables ─────────────────────────────────────────────────────
		function buildActions(ticket) {
			const btns = [];
			if (ticket.status === 'Open') {
				btns.push(`<button class="secondary" onclick="setStatus(${ticket.id},'In Progress')">Start</button>`);
			}
			if (ticket.status !== 'Resolved') {
				if (ticket.category === 'Password Reset') {
					btns.push(`<button onclick="doPasswordReset(${ticket.id})">Reset PW</button>`);
				}
				if (ticket.category === 'Account Lockout') {
					btns.push(`<button onclick="doUnlock(${ticket.id})">Unlock</button>`);
				}
				if (ticket.category === 'New Hire Setup') {
					btns.push(`<button onclick="doNewHire(${ticket.id})">Finish Hire</button>`);
				}
				btns.push(`<button class="primary" onclick="setStatus(${ticket.id},'Resolved')">Resolve</button>`);
			}
			btns.push(`<button class="secondary" onclick="openDetail(${ticket.id})">Notes</button>`);
			return btns.join(' ');
		}

		function renderOpenTickets(tickets) {
			const tbody = document.querySelector('#tickets-open-table tbody');
			if (!tickets.length) {
				tbody.innerHTML = '<tr class="empty-row"><td colspan="9">No open tickets</td></tr>';
				return;
			}
			tbody.innerHTML = tickets.map(t => `
				<tr>
					<td><a href="#" onclick="openDetail(${t.id});return false">#${t.id}</a></td>
					<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(t.title)}">${escHtml(t.title)}</td>
					<td>${escHtml(t.category)}</td>
					<td>${priorityBadge(t.priority)}</td>
					<td>${statusBadge(t.status)}</td>
					<td>${escHtml(t.user_affected)}</td>
					<td>${escHtml(t.assigned_to || '—')}</td>
					<td>${slaDisplay(t.sla_deadline, t.status)}</td>
					<td class="actions">${buildActions(t)}</td>
				</tr>
			`).join('');
		}

		function renderClosedTickets(tickets) {
			const tbody = document.querySelector('#tickets-closed-table tbody');
			if (!tickets.length) {
				tbody.innerHTML = '<tr class="empty-row"><td colspan="7">No resolved tickets</td></tr>';
				return;
			}
			tbody.innerHTML = tickets.map(t => `
				<tr>
					<td><a href="#" onclick="openDetail(${t.id});return false">#${t.id}</a></td>
					<td>${escHtml(t.title)}</td>
					<td>${escHtml(t.category)}</td>
					<td>${priorityBadge(t.priority)}</td>
					<td>${escHtml(t.user_affected)}</td>
					<td>${escHtml(t.assigned_to || '—')}</td>
					<td>${statusBadge(t.status)}</td>
				</tr>
			`).join('');
		}

		async function loadTickets() {
			allTickets = await fetchJson('/api/tickets');
			const open   = allTickets.filter(t => t.status !== 'Resolved');
			const closed = allTickets.filter(t => t.status === 'Resolved');
			renderOpenTickets(open);
			renderClosedTickets(closed);
		}

		// ── Users / Computers / Departments ───────────────────────────────────
		async function loadUsers() {
			const users = await fetchJson('/api/users');
			const tbody = document.querySelector('#users-table tbody');
			tbody.innerHTML = users.map(u => `
				<tr>
					<td>${escHtml(u.username)}</td>
					<td>${escHtml(u.full_name)}</td>
					<td>${escHtml(u.department)}</td>
					<td>${escHtml(u.email)}</td>
					<td><code class="secret">${escHtml(u.password)}</code></td>
					<td style="color:${u.is_locked ? '#dc2626' : '#059669'}">${u.is_locked ? 'Locked' : 'Active'}</td>
				</tr>
			`).join('');
			// Populate create-ticket user dropdown
			const sel = document.getElementById('ct-user');
			sel.innerHTML = users.map(u => `<option value="${escHtml(u.username)}">${escHtml(u.username)} — ${escHtml(u.full_name)}</option>`).join('');
		}

		async function loadComputers() {
			const computers = await fetchJson('/api/computers');
			const tbody = document.querySelector('#computers-table tbody');
			tbody.innerHTML = computers.map(c => `
				<tr>
					<td>${escHtml(c.hostname)}</td>
					<td>${escHtml(c.ip_address)}</td>
					<td>${escHtml(c.department)}</td>
					<td>${escHtml(c.user_assigned)}</td>
				</tr>
			`).join('');
		}

		async function loadDepartments() {
			const depts = await fetchJson('/api/departments');
			const tbody = document.querySelector('#departments-table tbody');
			tbody.innerHTML = depts.map(d => `
				<tr><td>${escHtml(d.name)}</td><td>${escHtml(d.manager)}</td></tr>
			`).join('');
		}

		async function loadAll() {
			await Promise.all([loadTickets(), loadUsers(), loadComputers(), loadDepartments()]);
		}

		// ── Ticket actions ────────────────────────────────────────────────────
		async function generateTickets() {
			const count = parseInt(prompt('How many tickets to generate?', '5'), 10);
			if (!count || count <= 0) return;
			await fetchJson('/api/tickets/generate', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ count }),
			});
			await loadAll();
		}

		async function clearTickets() {
			if (!confirm('Delete all tickets and notes? This cannot be undone.')) return;
			await fetch('/api/tickets/clear', { method: 'DELETE' });
			await loadAll();
		}

		async function setStatus(ticketId, status) {
			await fetchJson(`/api/ticket/${ticketId}/status`, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ status }),
			});
			await loadAll();
		}

		async function doPasswordReset(ticketId) {
			const pw = prompt('Enter new password for this user:');
			if (!pw) return;
			await fetchJson(`/api/ticket/${ticketId}/manual_password_reset`, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ new_password: pw }),
			});
			await loadAll();
		}

		async function doUnlock(ticketId) {
			await fetchJson(`/api/ticket/${ticketId}/manual_account_unlock`, { method: 'POST' });
			await loadAll();
		}

		async function doNewHire(ticketId) {
			await fetchJson(`/api/ticket/${ticketId}/manual_new_hire`, { method: 'POST' });
			await loadAll();
		}

		// ── Create Ticket Modal ───────────────────────────────────────────────
		function openCreateModal() {
			document.getElementById('ct-title').value = '';
			document.getElementById('ct-description').value = '';
			document.getElementById('ct-assigned').value = '';
			openModal('create-modal');
		}

		async function submitCreateTicket() {
			const title    = document.getElementById('ct-title').value.trim();
			const category = document.getElementById('ct-category').value;
			const priority = document.getElementById('ct-priority').value;
			const user     = document.getElementById('ct-user').value;
			const assigned = document.getElementById('ct-assigned').value.trim();
			const desc     = document.getElementById('ct-description').value.trim();

			if (!title) { alert('Title is required.'); return; }
			if (!desc)  { alert('Description is required.'); return; }

			await fetchJson('/api/tickets/create', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({
					title, category, priority, user_affected: user,
					assigned_to: assigned || null, description: desc,
				}),
			});
			closeModal('create-modal');
			await loadAll();
		}

		// ── Ticket Detail / Notes Modal ───────────────────────────────────────
		async function openDetail(ticketId) {
			currentDetailTicketId = ticketId;
			const ticket = allTickets.find(t => t.id === ticketId);
			if (!ticket) return;

			document.getElementById('detail-title').textContent = `#${ticket.id} — ${ticket.title}`;
			document.getElementById('detail-description').textContent = ticket.description;
			document.getElementById('detail-grid').innerHTML = [
				['Category', ticket.category],
				['Priority', priorityBadge(ticket.priority)],
				['Status', statusBadge(ticket.status)],
				['User Affected', ticket.user_affected],
				['Assigned To', ticket.assigned_to || '—'],
				['Created', fmtDate(ticket.created_at)],
				['SLA Deadline', fmtDate(ticket.sla_deadline)],
				['SLA Remaining', slaDisplay(ticket.sla_deadline, ticket.status)],
			].map(([label, val]) => `
				<div class="detail-item"><label>${label}</label><span>${val}</span></div>
			`).join('');

			await refreshNotes(ticketId);
			document.getElementById('new-note-body').value = '';
			openModal('detail-modal');
		}

		async function refreshNotes(ticketId) {
			const notes = await fetchJson(`/api/ticket/${ticketId}/notes`);
			const list  = document.getElementById('note-list');
			if (!notes.length) {
				list.innerHTML = '<p style="color:#9ca3af;font-size:0.85rem">No notes yet.</p>';
				return;
			}
			list.innerHTML = notes.map(n => `
				<div class="note-item">
					<div class="note-meta">${escHtml(n.author)} &middot; ${fmtDate(n.created_at)}</div>
					<div class="note-body">${escHtml(n.body)}</div>
				</div>
			`).join('');
		}

		async function submitNote() {
			const body   = document.getElementById('new-note-body').value.trim();
			const author = document.getElementById('new-note-author').value.trim() || 'Technician';
			if (!body) return;
			await fetchJson(`/api/ticket/${currentDetailTicketId}/note`, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ body, author }),
			});
			document.getElementById('new-note-body').value = '';
			await refreshNotes(currentDetailTicketId);
		}

		// ── Misc ──────────────────────────────────────────────────────────────
		function exportUsers() {
			window.location.href = '/api/export_users';
		}

		function escHtml(str) {
			if (str == null) return '';
			return String(str)
				.replace(/&/g, '&amp;')
				.replace(/</g, '&lt;')
				.replace(/>/g, '&gt;')
				.replace(/"/g, '&quot;');
		}

		window.addEventListener('load', loadAll);
	</script>
</body>
</html>
